name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v0.1.0)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile

      - name: Build binary
        run: bun build --compile src/main.ts --target=bun-linux-x64 --outfile cc-im-linux-x64

      - name: Create archive
        run: tar -czf cc-im-linux-x64.tar.gz cc-im-linux-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-im-linux-x64
          path: cc-im-linux-x64.tar.gz

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun build --compile src/main.ts --target=bun-linux-arm64 --outfile cc-im-linux-arm64

      - name: Create archive
        run: tar -czf cc-im-linux-arm64.tar.gz cc-im-linux-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-im-linux-arm64
          path: cc-im-linux-arm64.tar.gz

  build-darwin-x64:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun build --compile src/main.ts --target=bun-darwin-x64 --outfile cc-im-darwin-x64

      - name: Create archive
        run: tar -czf cc-im-darwin-x64.tar.gz cc-im-darwin-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-im-darwin-x64
          path: cc-im-darwin-x64.tar.gz

  build-darwin-arm64:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun build --compile src/main.ts --target=bun-darwin-arm64 --outfile cc-im-darwin-arm64

      - name: Create archive
        run: tar -czf cc-im-darwin-arm64.tar.gz cc-im-darwin-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-im-darwin-arm64
          path: cc-im-darwin-arm64.tar.gz

  release:
    needs: [build-linux-x64, build-linux-arm64, build-darwin-x64, build-darwin-arm64]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Display artifacts
        run: ls -la ./artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.version != ''
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Release ${{ github.event.inputs.version || github.ref_name }}
          draft: false
          prerelease: false
          files: ./artifacts/*
          generate_release_notes: true

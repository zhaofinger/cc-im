name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x64
            name: linux-x64
          - os: ubuntu-24.04-arm
            target: arm64
            name: linux-arm64
          - os: macos-latest
            target: x64
            name: darwin-x64
          - os: macos-latest
            target: arm64
            name: darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun build --compile src/main.ts --outfile cc-im-${{ matrix.name }}

      - name: Create archive
        run: |
          if [[ "${{ matrix.name }}" == *"windows"* ]]; then
            zip cc-im-${{ matrix.name }}.zip cc-im-${{ matrix.name }}.exe
          else
            tar -czf cc-im-${{ matrix.name }}.tar.gz cc-im-${{ matrix.name }}
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-im-${{ matrix.name }}
          path: |
            cc-im-${{ matrix.name }}.tar.gz
            cc-im-${{ matrix.name }}.zip
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: cc-im-*

      - name: Display artifacts
        run: ls -la ./artifacts/*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.version != ''
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Release ${{ github.event.inputs.version || github.ref_name }}
          draft: false
          prerelease: false
          files: ./artifacts/**/*
          generate_release_notes: true
